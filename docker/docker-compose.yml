# Self-hosted clank example stack: minio (object storage) + clank-sync
# (checkpoint substrate) + clankd (gateway with local provisioner).
#
# Run:  docker compose -f docker/docker-compose.yml up -d --build
# Stop: docker compose -f docker/docker-compose.yml down
#
# One-time prereq: `make docker-setup` adds `127.0.0.1 clank-minio` to
# your /etc/hosts. Reason: clank-sync mints SigV4-signed presigned S3
# URLs whose Host header is part of the signature — laptop and
# containers must dial the *same* hostname for the signature to verify.
# Containers resolve `clank-minio` via Docker DNS; the laptop needs the
# /etc/hosts entry to do the same. See docker/README.md for details.

name: clank

services:
  # ── object storage ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    hostname: clank-minio
    networks:
      default:
        aliases: [clank-minio]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clankadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clankadmin}
    command: server /data --console-address :9001
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── one-shot bucket creation ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://clank-minio:9000 ${MINIO_ROOT_USER:-clankadmin} ${MINIO_ROOT_PASSWORD:-clankadmin} &&
      (mc mb local/${CLANK_BUCKET:-clank} || true) &&
      mc anonymous set download local/${CLANK_BUCKET:-clank} || true
      "

  # ── checkpoint substrate ────────────────────────────────────────
  clank-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: clank:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: ["clank-sync"]
    environment:
      CLANK_SYNC_LISTEN_ADDR: ":8081"
      CLANK_SYNC_DB_PATH: "/var/lib/clank/clank-sync.db"
      CLANK_SYNC_S3_BUCKET: "${CLANK_BUCKET:-clank}"
      CLANK_SYNC_S3_REGION: "us-east-1"
      # The hostname here is what gets baked into presigned URLs.
      # See docker/README.md: laptop uses /etc/hosts to map this to
      # 127.0.0.1 so the same URL is reachable from both worlds.
      CLANK_SYNC_S3_ENDPOINT: "http://clank-minio:9000"
      CLANK_SYNC_S3_ACCESS_KEY: "${MINIO_ROOT_USER:-clankadmin}"
      CLANK_SYNC_S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-clankadmin}"
      CLANK_SYNC_S3_PATH_STYLE: "true"
      CLANK_SYNC_PRESIGN_TTL: "${CLANK_SYNC_PRESIGN_TTL:-5m}"
    ports:
      - "${CLANK_SYNC_PORT:-8081}:8081"
    volumes:
      - clank-sync-data:/var/lib/clank
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── gateway (with local provisioner) ────────────────────────────
  clankd:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: clank:latest
    depends_on:
      clank-sync:
        condition: service_healthy
    command:
      - "clankd"
      - "start"
      - "--foreground"
      - "--listen=tcp://0.0.0.0:7878"
      - "--sync-base-url=http://clank-sync:8081"
      # PublicBaseURL is the URL sprites can reach back at when they
      # eventually push checkpoints (P4+). Required by daytona/flyio
      # provisioner validation; unused by the local provisioner. For
      # real cloud sprites override CLANK_PUBLIC_BASE_URL with a
      # publicly reachable URL (e.g. a cloudflared tunnel — see
      # `make cloud-hub`).
      - "--public-base-url=${CLANK_PUBLIC_BASE_URL:-http://clank-sync:8081}"
    ports:
      - "${CLANKD_PORT:-7878}:7878"
    volumes:
      - clankd-data:/root/.clank
      # Provide the prefs file with the bearer token + provisioner choice.
      - ./preferences.json:/root/.clank/preferences.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7878/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  minio-data:
  clank-sync-data:
  clankd-data:
