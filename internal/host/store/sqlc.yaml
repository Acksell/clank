version: "2"
# sqlc generates type-safe Go code for the host's local SQLite. Mirrors
# the layout of internal/store/sqlc.yaml but the schema is host-side
# (sessions, primary_agents) — completely separate database file from
# the provisioner-side clank.db.
#
# Regenerate with:  sqlc generate -f internal/host/store/sqlc.yaml
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "schema"
    gen:
      go:
        package: "hostsqlitedb"
        out: "hostsqlitedb"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: false
        emit_prepared_queries: false
        emit_pointers_for_null_types: false
